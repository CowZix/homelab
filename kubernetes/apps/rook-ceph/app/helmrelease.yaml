---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph
  namespace: rook-ceph
spec:
  chart:
    spec:
      chart: rook-ceph
      sourceRef:
        kind: HelmRepository
        name: rook-ceph
      version: "1.14.1"
  interval: 1h
  values:
    cephClusterSpec:
      cephVersion:
        image: quay.io/ceph/ceph:v18.2.1
      mon:
        count: 1
      mgr:
        count: 1
      dashboard:
        enabled: true
        ssl: false
      crashCollector:
        disable: false
      logCollector:
        enabled: false
      storage:
        useAllNodes: true
        useAllDevices: false
        config:
          osType: linux
          dataDirHostPath: /var/lib/rook
    cephBlockPoolsVolumeSnapshotClass:
      enabled: false
    cephFileSystems: []
    cephObjectStores: []
    operatorNamespace: rook-ceph
    persistence:
      data:
        type: hostPath
        hostPath: /var/lib/home-assistant
        globalMounts:
          - path: /config
