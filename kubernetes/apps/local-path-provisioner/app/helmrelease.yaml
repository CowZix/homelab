---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: local-path-provisioner
spec:
  chartRef:
    kind: OCIRepository
    name: local-path-provisioner
  interval: 1h
  values:
    fullnameOverride: local-path-provisioner
    serviceAccount:
      create: true
      name: local-path-provisioner-sa
    rbac:
      create: true
    configmap:
      create: true
      config:
        nodePathMap:
          - node: DEFAULT_PATH_FOR_NON_LISTED_NODES
            paths:
              - /var/mnt/local-path-provisioner
    storageClass:
      create: true
      isDefault: true
      name: local-path
      provisioner: rancher.io/local-path
      reclaimPolicy: Delete
    podSecurityContext:
      runAsNonRoot: false
      runAsUser: 0
    podSecurityPolicy:
      enabled: true
