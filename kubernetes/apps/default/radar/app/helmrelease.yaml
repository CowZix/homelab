apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: radar
spec:
  chartRef:
    kind: OCIRepository
    name: radar
  interval: 1h
  values:
    controllers:
      radar:
        replicas: 1
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: ghcr.io/skyhook-io/radar
              tag: latest
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
    rbac:
      create: true
      helm: false
      secrets: false
      viewRBAC: false
      podExec: false
      podLogs: true
      portForward: false
      selfUpgrade: false
      traffic:
        hubble: true
      crdGroups:
        argo: true
        certManager: true
        contour: true
        crossplane: true
        externalSecrets: true
        flux: true
        gatewayApi: true
        istio: true
        karpenter: true
        keda: true
        knative: true
        kyverno: true
        prometheus: true
        traefik: true
        verticalPodAutoscaler: true

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

    service:
      app:
        ports:
          http:
            port: &port 9280

    route:
      app:
        hostnames: ["radar.onmyputer.com"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: 9280