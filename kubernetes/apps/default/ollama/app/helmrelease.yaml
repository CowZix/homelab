apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama
spec:
  chartRef:
    kind: OCIRepository
    name: ollama
  interval: 1h
  values:
    controllers:
      ollama:
        replicas: 1
        strategy: Recreate
        containers:
          app:
            image:
              repository: ollama/ollama
              tag: latest
            env:
              OLLAMA_HOST: 0.0.0.0
              OLLAMA_PORT: &port 11434
              TZ: UTC
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 2
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 500m
                memory: 1Gi
              limits:
                cpu: 2
                memory: 8Gi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0

    service:
      app:
        ports:
          http:
            port: 11434

    route:
      app:
        hostnames: ["{{ .Release.Name }}.onmyputer.com"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port

    persistence:
      data:
        type: hostPath
        hostPath: /var/lib/ollama
        globalMounts:
          - path: /root/.ollama