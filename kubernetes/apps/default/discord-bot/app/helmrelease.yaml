---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: discord-bot
spec:
  chartRef:
    kind: OCIRepository
    name: discord-bot
  interval: 1h
  values:
    controllers:
      discord-bot:
        replicas: 1
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/cowzix/discord-bot
              tag: latest
              pullPolicy: Always
            env:
              TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: discord-bot-secret
                    key: TOKEN
              YOUTUBE:
                valueFrom:
                  secretKeyRef:
                    name: discord-bot-secret
                    key: YOUTUBE
              PREFIX: "glorp!"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
#    persistence:
#      data:
#        type: persistentVolumeClaim
#        existingClaim: discord-bot-data
#        globalMounts:
#          - path: /app/src/discord_bot/database