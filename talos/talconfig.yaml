---
clusterName: kubernetes

talosVersion: "${talosVersion}"
kubernetesVersion: "${kubernetesVersion}"

endpoint: https://10.0.20.88:6443
additionalApiServerCertSans: &sans
  - "127.0.0.1"
  - "10.0.20.88"
additionalMachineCertSans: *sans

clusterPodNets: ["10.42.0.0/16"]
clusterSvcNets: ["10.43.0.0/16"]

# Disable built-in CNI to use Cilium
cniConfig:
  name: none

nodes:
  - hostname: "kubernetes-01"
    ipAddress: "10.0.20.80"
    installDiskSelector:
      serial: "MQ12W62510097"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/8d37fcc01bb9173406853e7fd97ad9eda40732043f88e09dafe55e53fcf4b510
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "84:47:09:5f:40:16"
        dhcp: false
        addresses:
          - "10.0.20.80/24"
        routes:
          - gateway: "10.0.20.1"
            network: 0.0.0.0/0
        mtu: 1500
        vip:
          ip: "10.0.20.88"

# Global patches
patches:
  - "@./patches/global/machine-files.yaml"
  - "@./patches/global/machine-kubelet.yaml"
  - "@./patches/global/machine-network.yaml"
  - "@./patches/global/machine-sysctls.yaml"
  - "@./patches/global/machine-time.yaml"

# Controller patches
controlPlane:
  patches:
    - "@./patches/controller/cluster.yaml"

